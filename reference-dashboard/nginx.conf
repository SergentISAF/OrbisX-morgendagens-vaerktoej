server {
    listen 4321;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|webp)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
