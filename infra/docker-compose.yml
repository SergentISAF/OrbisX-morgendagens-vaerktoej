services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: orbisx
      POSTGRES_PASSWORD: orbisx_dev
      POSTGRES_DB: orbisx
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orbisx"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  api:
    build:
      context: ../api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://orbisx:orbisx_dev@postgres:5432/orbisx
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    volumes:
      - ../api:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  dashboard:
    build:
      context: ../reference-dashboard
      dockerfile: Dockerfile
    environment:
      PUBLIC_API_URL: http://localhost:8000
    ports:
      - "4321:4321"
    volumes:
      - ../reference-dashboard:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres_data:
  redis_data:
