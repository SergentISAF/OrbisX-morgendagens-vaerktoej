services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: orbisx
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-orbisx_prod_change_me}
      POSTGRES_DB: orbisx
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orbisx"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped

  api:
    build:
      context: ../api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://orbisx:${POSTGRES_PASSWORD:-orbisx_prod_change_me}@postgres:5432/orbisx
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: production
      CORS_ORIGINS: '["https://app.holmstadit.dk"]'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    restart: unless-stopped

  dashboard:
    build:
      context: ../reference-dashboard
      dockerfile: Dockerfile.prod
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "8095:80"
    volumes:
      - ../infra/Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - dashboard
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
